    function updateGame(dt) {
      if (game.over || game.paused) return; if (!(game.activePowerup && game.activePowerup.type === 'time_freeze')) { if (game.timer > 15 && game.timer - dt <= 15) SFX.voice('hurry_up'); game.timer -= dt; } if (game.timer <= 0) { game.timer = 0; endLevel(); return; }

      if (game.achievementPopups && game.achievementPopups.length) {
        for (let i = game.achievementPopups.length - 1; i >= 0; i--) {
          game.achievementPopups[i].timer -= dt;

      // Chef animation
      game.chefTimer += dt;
      let anyCooking = false, anyDone = false;
      for (let t in game.stations) { if (game.stations[t].cooking) { anyCooking = true; if (game.stations[t].done) anyDone = true; } }
      game._anyCooking = anyCooking; game._anyDone = anyDone;
      if (game.fever) { if (game.chefTimer > 0.15) { game.chefTimer = 0; game.chefFrame = (game.chefFrame + 1) % 3 + 3; } }
      else if (anyDone) { if (game.chefTimer > 0.5) { game.chefTimer = 0; game.chefFrame = game.chefFrame === 5 ? 4 : 5; } }

      else { if (game.chefTimer > 0.8) { game.chefTimer = 0; game.chefFrame = game.chefFrame === 0 ? 1 : 0; } }
      for (let i = game.effects.length - 1; i >= 0; i--) { game.effects[i].t -= dt; game.effects[i].y -= 35 * dt; if (game.effects[i].t <= 0) game.effects.splice(i, 1); }
      for (let i = game.coinFlies.length - 1; i >= 0; i--) { let c = game.coinFlies[i]; c.life -= dt; let ax = (c.tx - c.x) * 0.08; let ay = (c.ty - c.y) * 0.08; c.vx += ax; c.vy += ay; c.x += c.vx; c.y += c.vy; if (c.life <= 0 || (Math.abs(c.x - c.tx) < 10 && Math.abs(c.y - c.ty) < 10)) game.coinFlies.splice(i, 1); }

          X.fillStyle = '#FFD200'; X.font = 'bold 14px sans-serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
          X.fillText(ap.icon + ' ' + ap.name, ax, ay - 4);
          X.fillStyle = 'rgba(255,255,255,0.7)'; X.font = '11px sans-serif';
          X.fillText(ap.desc, ax, ay + 14);
          X.restore();
          X.globalAlpha = 1;
        }
      }
      if (game.fever) {
        // Flame border effect
        let fvT = Date.now() / 100;
        X.save(); X.globalAlpha = 0.25 + Math.sin(fvT * 2) * 0.1;
        X.strokeStyle = '#FF6600'; X.lineWidth = 6;
        X.shadowColor = 'rgba(255,100,0,0.8)'; X.shadowBlur = 20;
        X.strokeRect(3, 3, GW - 6, GH - 6);
        X.strokeStyle = '#FFAA00'; X.lineWidth = 2;
        X.shadowColor = 'rgba(255,200,0,0.5)'; X.shadowBlur = 10;
        X.strokeRect(8, 8, GW - 16, GH - 16);
        X.restore();
        // Fever text with pulsing glow
        let pulse = 1 + Math.sin(fvT * 3) * 0.15;
        X.save();
        X.shadowColor = 'rgba(255,100,0,0.9)'; X.shadowBlur = 25 * pulse;
        X.fillStyle = '#FF6600'; X.font = 'bold 22px sans-serif'; X.textAlign = 'center';
        X.fillText('🔥 FEVER! ' + game.feverTimer.toFixed(1) + 's', GW / 2, 432);
        X.restore();
      }
    }

    function drawResult() {
      // Animated elements
      if (!game.resultAnim) game.resultAnim = { phase: 'intro', timer: 0, starY: [-200, -250, -180], scoreDisplay: 0 };
      let ra = game.resultAnim, dt2 = 0.016;
      ra.timer += dt2;
      if (ra.phase === 'intro' && ra.timer > 0.6) { ra.phase = 'stars'; ra.timer = 0; }
      if (ra.phase === 'stars' && ra.timer > 0.8) { ra.phase = 'score'; ra.timer = 0; }
      if (ra.phase === 'score') {
        let diff = game.score - ra.scoreDisplay;
        ra.scoreDisplay += Math.max(1, Math.ceil(diff * 0.08));
        if (ra.scoreDisplay > game.score) ra.scoreDisplay = game.score;
      }
      let bgGrd = X.createLinearGradient(0, 0, 0, GH); bgGrd.addColorStop(0, 'rgba(8,8,25,0.97)'); bgGrd.addColorStop(0.5, 'rgba(15,15,40,0.97)'); bgGrd.addColorStop(1, 'rgba(8,8,25,0.97)');
      X.fillStyle = bgGrd; X.fillRect(0, 0, GW, GH);
      let stars = getStars(G.currentLevel, game.score), cfg = findLevel(G.currentLevel), ch = findChapter(G.currentLevel);
      let t = Date.now() / 1000;
      if (stars >= 1) {
        for (let i = 0; i < 20; i++) {
          let px = (Math.sin(t * 0.8 + i * 1.5) * 0.5 + 0.5) * GW, py = (Math.cos(t * 0.6 + i * 2.1) * 0.5 + 0.5) * GH;
          let pr = Math.max(0.3, 1 + Math.sin(t * 3 + i) * 1.5); X.fillStyle = 'rgba(255,210,0,' + Math.max(0, 0.1 + Math.sin(t * 2 + i) * 0.08) + ')'; X.beginPath(); X.arc(px, py, pr, 0, Math.PI * 2); X.fill();
        }
      }
      drawDecoCorner(25, 25, 30, false, false, 'rgba(255,210,0,0.15)'); drawDecoCorner(GW - 25, 25, 30, true, false, 'rgba(255,210,0,0.15)');
      drawDecoCorner(25, GH - 25, 30, false, true, 'rgba(255,210,0,0.15)'); drawDecoCorner(GW - 25, GH - 25, 30, true, true, 'rgba(255,210,0,0.15)');
      X.textAlign = 'center'; X.textBaseline = 'middle';
      X.save(); X.shadowColor = 'rgba(255,210,0,0.6)'; X.shadowBlur = 20; X.fillStyle = '#FFD200'; X.font = 'bold 24px sans-serif'; X.fillText('✈️ ' + (ch ? ch.name : '') + ' · ' + (cfg ? cfg.name : '') + ' 完成!', GW / 2, 80); X.restore();
      for (let s = 1; s <= 3; s++) {
        let sx = GW / 2 - 45 + (s - 1) * 45; let sy = 145;
        if (ra.phase === 'intro') { sy = ra.starY[s - 1]; ra.starY[s - 1] += (145 - ra.starY[s - 1]) * 0.08; }
        else if (ra.phase === 'stars') { sy = 145 + Math.sin(ra.timer * 8 + s) * 3; }
        if (s <= stars) {
          X.save(); X.shadowColor = 'rgba(255,210,0,0.7)'; X.shadowBlur = 15; drawStar(sx, sy, 20, '#FFD200'); X.restore();
          let starShine = X.createRadialGradient(sx, sy, 0, sx, sy, 20); starShine.addColorStop(0, 'rgba(255,255,255,0.3)'); starShine.addColorStop(1, 'rgba(255,255,255,0)'); X.fillStyle = starShine; X.beginPath(); X.arc(sx, sy, 20, 0, Math.PI * 2); X.fill();
        } else drawStar(sx, sy, 20, 'rgba(255,255,255,0.1)');
      }
      drawGlassPanel(GW / 2 - 160, 200, 320, 230, 22, 0.3);
      X.strokeStyle = 'rgba(255,255,255,0.08)'; X.lineWidth = 1;
      X.beginPath(); X.moveTo(GW / 2 - 140, 310); X.lineTo(GW / 2 + 140, 310); X.stroke();
      X.fillStyle = '#FFF'; X.font = '18px sans-serif'; X.fillText('得分: ' + ra.scoreDisplay, GW / 2, 240);
      X.fillStyle = 'rgba(255,255,255,0.7)'; X.font = '15px sans-serif'; X.fillText('服务: ' + game.served + ' 位乘客', GW / 2, 275); X.fillText('流失: ' + game.lost + ' 位乘客', GW / 2, 300);
      X.save(); X.shadowColor = 'rgba(255,210,0,0.4)'; X.shadowBlur = 8; X.fillStyle = '#FFD200'; X.font = 'bold 18px sans-serif'; X.fillText('💰 获得金币: +' + game.score, GW / 2, 345); X.restore();
      X.fillStyle = 'rgba(255,255,255,0.35)'; X.font = '12px sans-serif'; X.fillText('⭐ 目标: ' + cfg.g1 + ' / ' + cfg.g2 + ' / ' + cfg.g3, GW / 2, 385);
      if (stars === 0) { X.fillStyle = '#DC3232'; X.font = 'bold 18px sans-serif'; X.fillText('未达标，再试一次!', GW / 2, 440); }
      else if (stars === 3) { X.save(); X.shadowColor = 'rgba(255,210,0,0.5)'; X.shadowBlur = 12; X.fillStyle = '#FFD200'; X.font = 'bold 18px sans-serif'; X.fillText('🎉 完美通关!', GW / 2, 440); X.restore(); }
      else { X.fillStyle = '#8F8'; X.font = 'bold 18px sans-serif'; X.fillText('✅ 通关成功!', GW / 2, 440); }
      drawPillBtn(GW / 2 - 85, 580, 170, 52, '继 续', 'bold 19px sans-serif', '#4CAF50', '#2E7D32');
    }

    function draw() { X.clearRect(0, 0, GW, GH); if (G.scene === 'menu') drawMenu(); else if (G.scene === 'map') drawMap(); else if (G.scene === 'shop') drawShop(); else if (G.scene === 'game') drawGame(); else if (G.scene === 'result') drawResult(); }
    let lastTs = 0, errMsg = ''; function loop(ts) { let dt = (ts - lastTs) / 1000; lastTs = ts; if (dt > 0.05) dt = 0.05; try { if (dt > 0) update(dt); draw(); } catch (e) { errMsg = e.message + '\n' + e.stack; console.error(e); } if (errMsg) { X.fillStyle = 'red'; X.font = '12px monospace'; X.textAlign = 'left'; X.fillText(errMsg, 10, 400); } requestAnimationFrame(loop); }
    requestAnimationFrame(ts => { lastTs = ts; loop(ts); });
  </script>
</body>
